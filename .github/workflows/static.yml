name: Deploy static content to Pages

on:
  push:
    branches: ["main"]          # Altere para "master" se for o caso
  workflow_dispatch:            # Permite execução manual

# Permissões necessárias para Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    # 🔧 ADICIONADO: força ações a usar Node.js 24 (elimina o warning)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Fazer upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: github-pages        # Nome exigido pelo deploy-pages
          path: .                   # Altere para './public' se seus arquivos estiverem em uma subpasta

      - name: Implantar no GitHub Pages
        uses: actions/deploy-pages@v4
