name: Deploy static content to Pages

on:
  push:
    branches: ["main"]          # ou "master" se for o caso
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # força Node.js 24

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: (Opcional) Listar arquivos para depuração
        run: ls -la

      - name: Fazer upload do artefato para Pages (forma oficial)
        uses: actions/upload-pages-artifact@v3   # <-- específica para Pages
        with:
          path: .                               # ou './public' se seus arquivos estiverem lá

      - name: Implantar no GitHub Pages
        uses: actions/deploy-pages@v4
